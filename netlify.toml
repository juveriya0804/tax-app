[build]
  publish = "frontend/dist"
  command = "npm install && DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy npx prisma generate && cd frontend && npm install && npm run build"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
