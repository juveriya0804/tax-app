[build]
  publish = "frontend/dist"
  command = "npm install && npx prisma db push --accept-data-loss && npx ts-node seed.ts && npx prisma generate && cd frontend && npm install && npm run build"
  functions = "netlify/functions"

[functions]
  included_files = ["prisma/dev.db"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
