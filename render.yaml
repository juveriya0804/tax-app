services:
  # The Node.js Express Backend
  - type: web
    name: tax-app-backend
    env: node
    plan: free
    buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy && npm run build"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tax-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  # The PostgreSQL Database
  - name: tax-app-db
    databaseName: taxapp
    user: taxuser
    plan: free
